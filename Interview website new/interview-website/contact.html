<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | InterviewForge</title>
  <meta name="description" content="Get in touch with the InterviewForge team for feedback, content corrections, or partnership queries.">
  <link rel="canonical" href="https://www.interviewforge.example.com/contact.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>
  <section class="page-hero">
    <div class="container">
      <nav class="breadcrumb"><a href="index.html">Home</a><span aria-hidden="true">/</span><span>Contact</span></nav>
      <h1>Contact Us</h1>
      <p>Found an error in a question? Have a suggestion? We'd love to hear from you.</p>
    </div>
  </section>
  <main class="container section">
    <div class="prose">
      <form id="contact-form">
        <div class="form-field"><label for="c-name">Name</label><input id="c-name" type="text" required></div>
        <div class="form-field"><label for="c-email">Email</label><input id="c-email" type="email" required></div>
        <div class="form-field"><label for="c-subject">Subject</label><input id="c-subject" type="text" required></div>
        <div class="form-field"><label for="c-message">Message</label><textarea id="c-message" required></textarea></div>
        <button type="submit" class="btn btn-primary btn-block">Send Message</button>
      </form>
      <p style="margin-top:24px; font-size:0.85rem;">This is a demo form for a static site — connect it to a form backend (e.g. Formspree, Getform, or your own API) before going live.</p>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script src="js/script.js"></script>
</body>
</html>
