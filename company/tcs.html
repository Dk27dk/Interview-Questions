<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCS Interview Questions 2026 (with Answers) | InterviewClear</title>
  <meta name="description" content="TCS interview questions 2026 covering TCS NQT online test, technical round, coding questions, and HR interview — with detailed answers and a free PDF download.">
  <meta name="keywords" content="TCS interview questions 2026, TCS NQT questions, TCS technical interview questions, TCS HR interview questions">
  <link rel="canonical" href="https://www.interviewclear.example.com/company/tcs.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="TCS Interview Questions 2026 (with Answers)">
  <meta property="og:description" content="Complete TCS interview preparation guide: online test, technical, coding & HR questions.">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-cat-type="company" data-cat-id="tcs" data-cat-name="TCS">
  <header id="site-header"></header>

  <section class="page-hero">
    <div class="container">
      <nav class="breadcrumb" id="breadcrumb"></nav>
      <h1 id="page-title">TCS Interview Questions</h1>
      <p id="page-overview">Loading company overview…</p>
      <div class="page-hero-actions">
        <button class="btn btn-primary" id="download-pdf-btn">⬇ Download TCS Interview Questions PDF</button>
        <a href="#questions" class="btn btn-outline">Jump to Questions</a>
      </div>
    </div>
  </section>

  <main class="container">
    <div class="topic-layout">
      <div>
        <div class="ad-slot ad-inline" style="margin-top:0;">Advertisement</div>

        <div class="filter-bar" id="filter-bar"></div>
        <div class="qa-list" id="questions"></div>

        <div class="ad-slot ad-inline">Advertisement</div>

        <section>
          <h2 class="section-heading" style="font-size:1.4rem;">Frequently Asked Questions</h2>
          <div id="faq-list"></div>
        </section>
      </div>

      <aside class="topic-sidebar">
        <div class="sidebar-box">
          <h4>Selection Process</h4>
          <ul id="selection-process"></ul>
        </div>
        <div class="sidebar-box">
          <h4>Interview Tips</h4>
          <ul id="interview-tips"></ul>
        </div>
        <div class="ad-slot ad-sidebar">Advertisement</div>
        <div class="sidebar-box">
          <h4>Other Companies</h4>
          <ul id="related-companies"></ul>
        </div>
      </aside>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="../js/script.js"></script>
  <script src="../js/pdf-generator.js"></script>
  <script>
    async function onPageReady() {
      const catId = document.body.dataset.catId;
      const catalog = await loadJSON('data/catalog.json');
      const meta = catalog.companies.find(c => c.id === catId);
      const items = await loadJSON(meta.file);

      document.title = `${meta.name} Interview Questions 2026 (with Answers) | InterviewClear`;
      document.getElementById('page-title').textContent = `${meta.name} Interview Questions`;
      document.getElementById('page-overview').textContent = meta.overview;

      injectBreadcrumbSchema([
        { name: 'Home', url: SITE.root + 'index.html' },
        { name: 'Companies', url: SITE.root + 'index.html#companies' },
        { name: meta.name, url: location.href }
      ]);
      document.getElementById('breadcrumb').innerHTML = `<a href="../index.html">Home</a><span aria-hidden="true">/</span><a href="../index.html">Companies</a><span aria-hidden="true">/</span><span>${meta.name}</span>`;

      document.getElementById('selection-process').innerHTML = meta.selectionProcess.map(s => `<li>${s}</li>`).join('');
      document.getElementById('interview-tips').innerHTML = meta.tips.map(t => `<li>${t}</li>`).join('');
      document.getElementById('related-companies').innerHTML = catalog.companies.filter(c => c.id !== catId).map(c => `<li><a href="${c.id}.html">${c.name} Questions</a></li>`).join('');

      const sections = ['online-test', 'technical', 'coding', 'hr'];
      const sectionLabels = { 'online-test': 'Online Test', 'technical': 'Technical Round', 'coding': 'Coding Questions', 'hr': 'HR Round' };
      let activeSection = 'all';

      function renderFiltered() {
        const filtered = activeSection === 'all' ? items : items.filter(q => q.section === activeSection);
        renderQuestionList(document.getElementById('questions'), filtered, { catType: 'company', catId });
      }

      document.getElementById('filter-bar').innerHTML = ['all', ...sections].map(s =>
        `<button class="filter-chip ${s === 'all' ? 'active' : ''}" data-section="${s}">${s === 'all' ? 'All Questions' : sectionLabels[s]}</button>`
      ).join('');
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeSection = chip.dataset.section;
          renderFiltered();
        });
      });
      renderFiltered();

      injectFAQSchema(items);
      document.getElementById('faq-list').innerHTML = items.slice(0, 6).map(q => `
        <details class="faq-item"><summary>${q.title}</summary><p>${q.answer}</p></details>`).join('');

      document.getElementById('download-pdf-btn').addEventListener('click', function () {
        downloadCategoryPDF({ categoryName: `${meta.name} Interview Questions`, items, triggerButton: this });
      });
    }
  </script>
</body>
</html>
